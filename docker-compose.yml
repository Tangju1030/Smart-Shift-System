version: '3.8'

services:
  backend:
    build: ./backend
    container_name: scheduler-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./scheduler.db
      - AI_PROVIDER=${AI_PROVIDER:-deepseek}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-}
    volumes:
      - ./data:/app/data
      - scheduler_db:/app
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: scheduler-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  scheduler_db:
